$kind: http-request
url: https://timeapi.io/api/conversion/dayoftheweek/2021-03-14
method: GET
scripts:
  - type: afterResponse
    code: "pm.test(\"Check if the status code is 20\", function () {\r

      \    pm.expect(pm.response.code).to.eql(200)\r

      })\r

      pm.test(\"Check if the status value is OK\", function () {\r

      \    pm.expect(pm.response.status).to.be.equal(\"OK\")\r

      })\r

      pm.test(\"Check if the response time is less than 30s\", function () {\r

      \    pm.expect(pm.response.responseTime).to.be.below(30000)\r

      })\r

      pm.test(\"Check if the response size is less than 15000B\", function ()
      {\r

      \    pm.expect(pm.response.responseSize).to.be.below(15000)\r

      })\r

      pm.test(\"Validate that the header value of serve is nginx/1.27.0\",
      function () {\r

      \    pm.expect(pm.response.headers.get(\"Server\")).to.be.contain(\"nginx\
      /1.27.0\")\r

      })\r

      pm.test(\"Validate that the header value of Date is Mon, 10 Nov 2025
      20:08:20 GMT\", function () {\r

      \    pm.expect(pm.response.headers.get(\"Date\")).to.be.contain(\"Mon, 10
      Nov 2025\")\r

      })\r

      pm.test(\"Validate that the header value of Content-Type is
      application/json; charset=utf-8\", function () {\r

      \    pm.expect(pm.response.headers.get(\"Content-Type\")).to.be.contain(\
      \"application/json; charset=utf-8\")\r

      })\r

      pm.test(\"Validate that the header value of Transfer-Encoding is
      chunked\", function () {\r

      \    pm.expect(pm.response.headers.get(\"Transfer-Encoding\")).to.be.cont\
      ain(\"chunked\")\r

      })\r

      pm.test(\"Validate that the header value of Connection is keep-alive\",
      function () {\r

      \    pm.expect(pm.response.headers.get(\"Connection\")).to.be.contain(\"k\
      eep-alive\")\r

      })\r

      pm.test(\"Validate that the header value of Vary is Accept-Encoding\",
      function () {\r

      \    pm.expect(pm.response.headers.get(\"Vary\")).to.be.contain(\"Accept-\
      Encoding\")\r

      })\r

      pm.test(\"Validate that the dayOfWeek is Sunday\", function () {\r

      \    pm.expect(pm.response.json().dayOfWeek).to.be.contain(\"Sunday\")\r

      })"
    language: text/javascript
order: 3000
