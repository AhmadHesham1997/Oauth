url: "{{baseUrl}}/maps/api/place/update/json?key={{apiKey}}"
method: PUT
queryParams:
  key: "{{apiKey}}"
body:
  type: json
  content: "{\r

    \  \"place_id\": \"{{placeId}}\",\r

    \  \"address\": \"New Address Egypt\",\r

    \  \"key\": \"{{apiKey}}\"\r

    }"
