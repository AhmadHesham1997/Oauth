  - type: beforeRequest
    code: "// here we make tests on the body we send not the response body.\r

      var ResponseBody = JSON.parse(pm.request.body.raw);\r

      \r

      pm.test(\"test body containt 2 attributes name and
      password\",function(){\r

      \    pm.expect(ResponseBody).to.have.property(\"username\");\r

      \    pm.expect(ResponseBody).to.have.property(\"password\");\r

      })\r

      pm.test(\"test to validate data types\",function(){\r

      \    pm.expect(ResponseBody.username).to.be.a(\"string\");\r

      \    pm.expect(ResponseBody.password).to.be.a(\"string\");\r

      })\r

      \r

      pm.test(\"validate that password field is not empty\", function(){\r

      \    pm.expect(ResponseBody.password).to.not.be.empty;\r

      })\r

      \r\n"
