$kind: http-request
url: https://ecommerce.routemisr.com/api/v1/auth/signup
method: POST
body:
  type: json
  content: |-
    {
        "name": "{{name}}",
        "email":"{{email}}",
        "password":"{{password}}",
        "rePassword":"{{rePassword}}",
        "phone":"{{phone}}"
    }
scripts:
  - type: afterResponse
    code: >
      // the variables that are present in the body are created from the titles
      found ins the csv type or the JSON file and the must match exactly to make
      collection runner where i can test multiple keys and values in one run.

      pm.test("Status code is 200" + " " + pm.iterationData.get("username") + "
      " + pm.iterationData.get("password"), function () {
          pm.response.to.have.status(200);
      });

      pm.test("Check if the status code is 200", function () {
          pm.expect(pm.response.code).to.eql(200)
      })

      pm.test("validating token " + " " + pm.iterationData.get("username") + " "
      + pm.iterationData.get("password"), function () {
          pm.expect(pm.response.json().token).to.not.be.null;
      });

      pm.test("Check if the status value is OK", function () {
          pm.expect(pm.response.status).to.be.equal("OK")
      })

      pm.test("Check if the response time is less than 30s", function () {
          pm.expect(pm.response.responseTime).to.be.below(30000)
      })

      pm.test("Check if the response size is less than 5000B", function () {
          pm.expect(pm.response.responseSize).to.be.below(5000)
      })

      pm.test("Validate that the header value of serve is Heroku", function () {
          pm.expect(pm.response.headers.get("Server")).to.be.contain("Heroku")
      })

      console.log("CSV username:", pm.iterationData.get("username"));

      console.log("CSV password:", pm.iterationData.get("password"));
    language: text/javascript
order: 1000
