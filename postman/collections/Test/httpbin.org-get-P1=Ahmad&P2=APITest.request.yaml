      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData.args.P1).to.eql(\"Ahmad\");\r

      });\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData.args.P2).to.eql(\"APITest\");\r

      });"
